# Load every dashboard JSON mounted under /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: questboard
    orgId: 1
    folder: Quest Board
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
