services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-questboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-questboard}
      POSTGRES_DB: ${POSTGRES_DB:-questboard}
    # Host publish is only for local dev / direct LAN access. The app reaches
    # postgres over the internal network, so this is not needed for the tunnel.
    # Set POSTGRES_HOST_PORT to a free host port if 5432 is taken.
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-questboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Full self-host build: Vite build -> embedded into the Go binary.
  # For day-to-day backend dev, run just postgres (`docker compose up postgres`)
  # and `go run ./cmd/server` on the host instead.
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_ADDR: ":8080"
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      SESSION_KEY: ${SESSION_KEY:?set SESSION_KEY in .env}
      DATABASE_URL: postgres://${POSTGRES_USER:-questboard}:${POSTGRES_PASSWORD:-questboard}@postgres:5432/${POSTGRES_DB:-questboard}?sslmode=disable
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    # Optional LAN access. NOT required for the tunnel (cloudflared reaches the
    # app over the internal network at app:8080 regardless of this mapping).
    # Override APP_HOST_PORT to avoid conflicts with other apps on the host.
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    profiles:
      - full

  # Cloudflare Tunnel: outbound-only connection to Cloudflare's edge — no inbound
  # ports, no public IP. Create a remotely-managed tunnel in the Zero Trust
  # dashboard, route the public hostname to http://app:8080, and put its token in
  # .env as TUNNEL_TOKEN.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env}
    depends_on:
      - app
    profiles:
      - full

volumes:
  pgdata:
