openapi: 3.0.3
info:
  title: Quest Board API
  version: 0.1.0
  description: |
    Self-hosted D&D campaign helper. This spec is the single source of truth for
    the API contract: the Go server interface and the TypeScript client are both
    generated from it (`make generate`).
servers:
  - url: /api

paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness / readiness probe
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: Service degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /me:
    get:
      operationId: getCurrentUser
      summary: The currently authenticated user and their campaign memberships
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /campaigns:
    get:
      operationId: listCampaigns
      summary: Campaigns the current user belongs to
      responses:
        "200":
          description: List of campaigns with the caller's role in each
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignMembership"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCampaign
      summary: Create a campaign (caller becomes its DM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /campaigns/join:
    post:
      operationId: joinCampaign
      summary: Join a campaign as a player using its invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCampaignRequest"
      responses:
        "200":
          description: The joined campaign with the caller's role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignMembership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/regenerate-invite:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    post:
      operationId: regenerateInvite
      summary: Generate a fresh invite code (DM only)
      responses:
        "200":
          description: Campaign with the new invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/quests:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: listQuests
      summary: List quests on a campaign's board (members only)
      responses:
        "200":
          description: Quests with rewards and claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createQuest
      summary: Post a new quest (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestRequest"
      responses:
        "201":
          description: Created quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /quests/{questId}:
    parameters:
      - $ref: "#/components/parameters/QuestId"
    patch:
      operationId: updateQuest
      summary: Update a quest, including its status and rewards (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestRequest"
      responses:
        "200":
          description: Updated quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteQuest
      summary: Remove a quest (DM only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/characters:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: listCharacters
      summary: The campaign's party roster (members only)
      responses:
        "200":
          description: Characters in the campaign
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createCharacter
      summary: Add a character owned by the caller (any campaign member)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "201":
          description: Created character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /characters/{characterId}:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    patch:
      operationId: updateCharacter
      summary: Update a character (its owner or the DM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCharacter
      summary: Remove a character (its owner or the DM)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /quests/{questId}/claim:
    parameters:
      - $ref: "#/components/parameters/QuestId"
    post:
      operationId: claimQuest
      summary: Claim a quest (any campaign member)
      responses:
        "200":
          description: Quest after claiming
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: unclaimQuest
      summary: Release a previously claimed quest
      responses:
        "200":
          description: Quest after unclaiming
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  security:
    - sessionCookie: []

  parameters:
    CampaignId:
      name: campaignId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuestId:
      name: questId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CharacterId:
      name: characterId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Not allowed (not a member, or insufficient role)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Role:
      type: string
      enum: [dm, player]

    User:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          nullable: true
        image:
          type: string
          nullable: true

    Campaign:
      type: object
      required: [id, name, ownerUserId, createdAt, inviteCode]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ownerUserId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        inviteCode:
          type: string
          description: Shareable code players use to join the campaign.

    CampaignMembership:
      type: object
      required: [campaign, role]
      properties:
        campaign:
          $ref: "#/components/schemas/Campaign"
        role:
          $ref: "#/components/schemas/Role"

    CurrentUser:
      type: object
      required: [user, campaigns]
      properties:
        user:
          $ref: "#/components/schemas/User"
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/CampaignMembership"

    CreateCampaignRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    JoinCampaignRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 1

    QuestStatus:
      type: string
      enum: [available, active, completed, failed]

    QuestDifficulty:
      type: string
      enum: [trivial, easy, medium, hard, deadly]

    RewardType:
      type: string
      enum: [gold, item, xp, reputation, other]

    QuestReward:
      type: object
      required: [id, type, label]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/RewardType"
        label:
          type: string
        value:
          type: string
          nullable: true

    QuestClaim:
      type: object
      required: [userId, userName, claimedAt]
      properties:
        userId:
          type: string
          format: uuid
        userName:
          type: string
        claimedAt:
          type: string
          format: date-time

    Quest:
      type: object
      required: [id, campaignId, title, description, difficulty, status, createdAt, rewards, claims, claimedByMe]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        giver:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        difficulty:
          $ref: "#/components/schemas/QuestDifficulty"
        status:
          $ref: "#/components/schemas/QuestStatus"
        createdAt:
          type: string
          format: date-time
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/QuestReward"
        claims:
          type: array
          items:
            $ref: "#/components/schemas/QuestClaim"
        claimedByMe:
          type: boolean

    Character:
      type: object
      required:
        [id, campaignId, ownerUserId, ownerName, name, class, level, hpCurrent, hpMax, createdAt, mine]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        ownerUserId:
          type: string
          format: uuid
        ownerName:
          type: string
          description: Display name of the member who plays this character.
        name:
          type: string
        class:
          type: string
          description: 'Freeform class/ancestry line, e.g. "Half-Elf Bard".'
        level:
          type: integer
        hpCurrent:
          type: integer
        hpMax:
          type: integer
        createdAt:
          type: string
          format: date-time
        mine:
          type: boolean
          description: True when the caller owns this character.

    CharacterInput:
      type: object
      required: [name, level, hpCurrent, hpMax]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        class:
          type: string
          maxLength: 80
        level:
          type: integer
          minimum: 1
          maximum: 20
        hpCurrent:
          type: integer
          minimum: 0
        hpMax:
          type: integer
          minimum: 1

    RewardInput:
      type: object
      required: [type, label]
      properties:
        type:
          $ref: "#/components/schemas/RewardType"
        label:
          type: string
          minLength: 1
        value:
          type: string
          nullable: true

    CreateQuestRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        giver:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        difficulty:
          $ref: "#/components/schemas/QuestDifficulty"
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/RewardInput"

    UpdateQuestRequest:
      type: object
      required: [title, status, difficulty]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        giver:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        difficulty:
          $ref: "#/components/schemas/QuestDifficulty"
        status:
          $ref: "#/components/schemas/QuestStatus"
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/RewardInput"

security:
  - sessionCookie: []
