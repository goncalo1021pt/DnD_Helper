openapi: 3.0.3
info:
  title: Quest Board API
  version: 0.1.0
  description: |
    Self-hosted D&D campaign helper. This spec is the single source of truth for
    the API contract: the Go server interface and the TypeScript client are both
    generated from it (`make generate`).
servers:
  - url: /api

paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness / readiness probe
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: Service degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /me:
    get:
      operationId: getCurrentUser
      summary: The currently authenticated user and their campaign memberships
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /campaigns:
    get:
      operationId: listCampaigns
      summary: Campaigns the current user belongs to
      responses:
        "200":
          description: List of campaigns with the caller's role in each
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignMembership"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCampaign
      summary: Create a campaign (caller becomes its DM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /campaigns/join:
    post:
      operationId: joinCampaign
      summary: Join a campaign as a player using its invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCampaignRequest"
      responses:
        "200":
          description: The joined campaign with the caller's role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignMembership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/regenerate-invite:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    post:
      operationId: regenerateInvite
      summary: Generate a fresh invite code (DM only)
      responses:
        "200":
          description: Campaign with the new invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/next-session:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    put:
      operationId: setNextSession
      summary: Set or clear when the table gathers next (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetNextSessionRequest"
      responses:
        "200":
          description: Campaign with the updated next session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/quests:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: listQuests
      summary: List quests on a campaign's board (members only)
      responses:
        "200":
          description: Quests with rewards and claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createQuest
      summary: Post a new quest (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestRequest"
      responses:
        "201":
          description: Created quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /quests/{questId}:
    parameters:
      - $ref: "#/components/parameters/QuestId"
    patch:
      operationId: updateQuest
      summary: Update a quest, including its status and rewards (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestRequest"
      responses:
        "200":
          description: Updated quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteQuest
      summary: Remove a quest (DM only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/characters:
    get:
      operationId: listMyCharacters
      summary: The caller's heroes across all campaigns, including unseated ones
      responses:
        "200":
          description: Heroes with where they are seated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMyCharacter
      summary: Forge a hero in My Heroes (not seated at any campaign)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "201":
          description: Created hero
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/characters/forge:
    post:
      operationId: forgeCharacter
      summary: Create a hero through the builder — full sheet, derived HP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgeRequest"
      responses:
        "201":
          description: The forged hero, resting in My Heroes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /characters/{characterId}/seat:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    put:
      operationId: seatCharacter
      summary: Seat a hero at a campaign, or null to return them to My Heroes (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeatRequest"
      responses:
        "200":
          description: Hero after moving
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The hero uses content the campaign's codex has not admitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeatConflict"

  /rules/{kind}:
    parameters:
      - $ref: "#/components/parameters/ContentKind"
    get:
      operationId: listRules
      summary: Rules content of one kind (SRD + this instance's homebrew)
      responses:
        "200":
          description: Content entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RulesContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRulesContent
      summary: Add a homebrew entry of this kind (any signed-in user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulesContentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rules/content/{contentId}:
    parameters:
      - name: contentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: updateRulesContent
      summary: Edit a homebrew entry (author only; SRD is immutable)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulesContentInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRulesContent
      summary: Remove a homebrew entry (author only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /characters/{characterId}/levelup:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      operationId: levelUpCharacter
      summary: Advance a forged hero one level (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LevelUpRequest"
      responses:
        "200":
          description: The hero, one level mightier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/codex:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: getCodex
      summary: The campaign's codex — every explicit ruling plus proposals (members)
      responses:
        "200":
          description: Codex entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodexEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: proposeCodexContent
      summary: Offer your homebrew to the table (members; DM decides)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contentIds]
              properties:
                contentIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
      responses:
        "204":
          description: Proposed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaignId}/codex/{contentId}:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
      - name: contentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: setCodexStatus
      summary: The DM's verdict on an entry (enable homebrew, ban/unban SRD)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [enabled, banned]
      responses:
        "204":
          description: Ruled
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: clearCodexStatus
      summary: Remove a ruling — back to defaults (DM only)
      responses:
        "204":
          description: Cleared
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaignId}/characters:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: listCharacters
      summary: The campaign's party roster (members only)
      responses:
        "200":
          description: Characters in the campaign
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createCharacter
      summary: Add a character owned by the caller (any campaign member)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "201":
          description: Created character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /characters/{characterId}:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    patch:
      operationId: updateCharacter
      summary: Update a character (its owner or the DM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCharacter
      summary: Remove a character (its owner or the DM)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/trees:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: listTrees
      summary: The campaign's skill trees (members only)
      responses:
        "200":
          description: Skill trees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillTree"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createTree
      summary: Create a skill tree (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillTreeInput"
      responses:
        "201":
          description: Created tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillTree"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /trees/{treeId}:
    parameters:
      - $ref: "#/components/parameters/TreeId"
    get:
      operationId: getTree
      summary: A skill tree with its full web (members only)
      responses:
        "200":
          description: Tree with nodes and edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillTreeDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateTree
      summary: Update a skill tree (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillTreeInput"
      responses:
        "200":
          description: Updated tree
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillTree"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTree
      summary: Delete a skill tree and its web (DM only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /trees/{treeId}/nodes:
    parameters:
      - $ref: "#/components/parameters/TreeId"
    post:
      operationId: createNode
      summary: Add a power node to a tree (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillNodeInput"
      responses:
        "201":
          description: Created node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillNode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /trees/{treeId}/edges:
    parameters:
      - $ref: "#/components/parameters/TreeId"
    put:
      operationId: setEdges
      summary: Replace the tree's web of connections (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillEdgesInput"
      responses:
        "200":
          description: Tree with the new web
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillTreeDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /nodes/{nodeId}:
    parameters:
      - $ref: "#/components/parameters/NodeId"
    patch:
      operationId: updateNode
      summary: Update a power node (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillNodeInput"
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillNode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteNode
      summary: Remove a power node (DM only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /characters/{characterId}/tree:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      operationId: getCharacterTree
      summary: A character's pact and web progress (members only)
      responses:
        "200":
          description: Pact state (assigned=false when no tree is bound)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterTreeState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: setCharacterTree
      summary: Bind a character to a tree — the pact (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPactRequest"
      responses:
        "200":
          description: New pact state (a changed tree resets progress)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterTreeState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /characters/{characterId}/tree/grants:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      operationId: grantPicks
      summary: Grant unspent picks at a story beat (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantPicksRequest"
      responses:
        "200":
          description: Pact state with the new grant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterTreeState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /characters/{characterId}/tree/picks:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      operationId: spendPick
      summary: Spend a granted pick on a reachable node (owner or DM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpendPickRequest"
      responses:
        "200":
          description: Pact state including the new power
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterTreeState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /quests/{questId}/claim:
    parameters:
      - $ref: "#/components/parameters/QuestId"
    post:
      operationId: claimQuest
      summary: Claim a quest (any campaign member)
      responses:
        "200":
          description: Quest after claiming
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: unclaimQuest
      summary: Release a previously claimed quest
      responses:
        "200":
          description: Quest after unclaiming
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  security:
    - sessionCookie: []

  parameters:
    CampaignId:
      name: campaignId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuestId:
      name: questId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CharacterId:
      name: characterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TreeId:
      name: treeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContentKind:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum: [class, species, background, subclass, feat]
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Not allowed (not a member, or insufficient role)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Role:
      type: string
      enum: [dm, player]

    User:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          nullable: true
        image:
          type: string
          nullable: true

    Campaign:
      type: object
      required: [id, name, ownerUserId, createdAt, inviteCode]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ownerUserId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        inviteCode:
          type: string
          description: Shareable code players use to join the campaign.
        nextSessionAt:
          type: string
          format: date-time
          nullable: true
          description: When the table gathers next; null when unscheduled.

    CampaignMembership:
      type: object
      required: [campaign, role]
      properties:
        campaign:
          $ref: "#/components/schemas/Campaign"
        role:
          $ref: "#/components/schemas/Role"

    CurrentUser:
      type: object
      required: [user, campaigns]
      properties:
        user:
          $ref: "#/components/schemas/User"
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/CampaignMembership"

    CreateCampaignRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    JoinCampaignRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 1

    SetNextSessionRequest:
      type: object
      properties:
        nextSessionAt:
          type: string
          format: date-time
          nullable: true
          description: Omit or send null to clear the scheduled session.

    QuestStatus:
      type: string
      enum: [available, active, completed, failed]

    QuestDifficulty:
      type: string
      enum: [trivial, easy, medium, hard, deadly]

    RewardType:
      type: string
      enum: [gold, item, xp, reputation, other]

    QuestReward:
      type: object
      required: [id, type, label]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/RewardType"
        label:
          type: string
        value:
          type: string
          nullable: true

    QuestClaim:
      type: object
      required: [userId, userName, claimedAt]
      properties:
        userId:
          type: string
          format: uuid
        userName:
          type: string
        claimedAt:
          type: string
          format: date-time

    Quest:
      type: object
      required: [id, campaignId, title, description, difficulty, status, createdAt, rewards, claims, claimedByMe]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        giver:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        difficulty:
          $ref: "#/components/schemas/QuestDifficulty"
        status:
          $ref: "#/components/schemas/QuestStatus"
        createdAt:
          type: string
          format: date-time
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/QuestReward"
        claims:
          type: array
          items:
            $ref: "#/components/schemas/QuestClaim"
        claimedByMe:
          type: boolean

    Character:
      type: object
      required:
        [id, ownerUserId, ownerName, name, class, level, hpCurrent, hpMax, createdAt, mine]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
          nullable: true
          description: The campaign this hero is seated at; null while in My Heroes.
        campaignName:
          type: string
          nullable: true
          description: Name of the seated campaign, when known.
        ownerUserId:
          type: string
          format: uuid
        ownerName:
          type: string
          description: Display name of the member who plays this character.
        name:
          type: string
        class:
          type: string
          description: 'Freeform class/ancestry line, e.g. "Half-Elf Bard".'
        level:
          type: integer
        hpCurrent:
          type: integer
        hpMax:
          type: integer
        createdAt:
          type: string
          format: date-time
        mine:
          type: boolean
          description: True when the caller owns this character.
        sheet:
          $ref: "#/components/schemas/CharacterSheet"

    CharacterSheet:
      type: object
      description: Present only on wizard-forged heroes.
      required: [abilities, skills]
      properties:
        abilities:
          $ref: "#/components/schemas/AbilityScores"
        skills:
          type: array
          items:
            type: string
        classId:
          type: string
          format: uuid
          nullable: true
        speciesId:
          type: string
          format: uuid
          nullable: true
        backgroundId:
          type: string
          format: uuid
          nullable: true
        subclassId:
          type: string
          format: uuid
          nullable: true
        feats:
          type: array
          items:
            type: string

    AbilityScores:
      type: object
      required: [str, dex, con, int, wis, cha]
      properties:
        str: { type: integer, minimum: 3, maximum: 30 }
        dex: { type: integer, minimum: 3, maximum: 30 }
        con: { type: integer, minimum: 3, maximum: 30 }
        int: { type: integer, minimum: 3, maximum: 30 }
        wis: { type: integer, minimum: 3, maximum: 30 }
        cha: { type: integer, minimum: 3, maximum: 30 }

    ForgeRequest:
      type: object
      required: [name, classId, speciesId, backgroundId, abilities, skills]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        classId:
          type: string
          format: uuid
        speciesId:
          type: string
          format: uuid
        backgroundId:
          type: string
          format: uuid
        abilities:
          $ref: "#/components/schemas/AbilityScores"
          description: Final scores, background bonuses already applied.
        skills:
          type: array
          items:
            type: string
          description: Chosen class skills (background skills are implied).

    CharacterInput:
      type: object
      required: [name, level, hpCurrent, hpMax]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        class:
          type: string
          maxLength: 80
        level:
          type: integer
          minimum: 1
          maximum: 20
        hpCurrent:
          type: integer
          minimum: 0
        hpMax:
          type: integer
          minimum: 1

    SeatRequest:
      type: object
      properties:
        campaignId:
          type: string
          format: uuid
          nullable: true
          description: Omit or null to unseat the hero back to My Heroes.

    RulesContent:
      type: object
      required: [id, kind, source, name, summary, data, mine]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [class, species, background, subclass, feat]
        source:
          type: string
          enum: [srd, homebrew]
        name:
          type: string
        summary:
          type: string
        data:
          type: object
          description: Kind-specific payload (hit die, traits, features…).
          additionalProperties: true
        mine:
          type: boolean
          description: True when the caller authored this homebrew entry.
        creatorName:
          type: string
          nullable: true
          description: Author of a homebrew entry; null for SRD content.

    RulesContentInput:
      type: object
      required: [name, summary, data]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        summary:
          type: string
          maxLength: 300
        data:
          type: object
          additionalProperties: true

    LevelUpRequest:
      type: object
      required: [hpMode]
      properties:
        hpMode:
          type: string
          enum: [average, roll]
        hpRoll:
          type: integer
          minimum: 1
          maximum: 12
          description: The hit-die result when hpMode is roll.
        subclassId:
          type: string
          format: uuid
          description: Required when the new level is the class's subclass level.
        featId:
          type: string
          format: uuid
          description: Take a feat instead of ability increases at an ASI level.
        asi:
          type: object
          description: Ability increases at an ASI level; total of 2 points, each +1 or +2.
          additionalProperties: false
          properties:
            str: { type: integer, minimum: 1, maximum: 2 }
            dex: { type: integer, minimum: 1, maximum: 2 }
            con: { type: integer, minimum: 1, maximum: 2 }
            int: { type: integer, minimum: 1, maximum: 2 }
            wis: { type: integer, minimum: 1, maximum: 2 }
            cha: { type: integer, minimum: 1, maximum: 2 }

    CodexEntry:
      type: object
      required: [content, status]
      properties:
        content:
          $ref: "#/components/schemas/RulesContent"
        status:
          type: string
          enum: [proposed, enabled, banned]
        proposerName:
          type: string
          nullable: true

    SeatConflict:
      type: object
      required: [error, missing]
      properties:
        error:
          type: string
        missing:
          type: array
          description: Content the hero uses that the codex has not admitted.
          items:
            type: object
            required: [id, kind, name, state]
            properties:
              id:
                type: string
                format: uuid
              kind:
                type: string
              name:
                type: string
              state:
                type: string
                enum: [absent, proposed, banned]
                description: absent = never offered; proposed = awaiting the DM; banned = the DM said no.

    NodeRarity:
      type: string
      enum: [minor, keystone]

    SkillTree:
      type: object
      required: [id, campaignId, name, description, keystonePickCost, createdAt]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        keystonePickCost:
          type: integer
          description: How many picks a keystone eats (1 = gated only by the web).
        createdAt:
          type: string
          format: date-time

    SkillTreeInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
        keystonePickCost:
          type: integer
          minimum: 1
          maximum: 5
          default: 1

    SkillNode:
      type: object
      required: [id, treeId, name, description, rarity, limb, isEntry]
      properties:
        id:
          type: string
          format: uuid
        treeId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        tradeoff:
          type: string
          nullable: true
          description: The price baked into a keystone.
        rarity:
          $ref: "#/components/schemas/NodeRarity"
        limb:
          type: string
          description: Grouping label within the web, e.g. ENTROPY.
        isEntry:
          type: boolean
          description: Pickable with no prior picks in the tree.
        posX:
          type: number
          nullable: true
        posY:
          type: number
          nullable: true

    SkillNodeInput:
      type: object
      required: [name, rarity]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
        tradeoff:
          type: string
          nullable: true
        rarity:
          $ref: "#/components/schemas/NodeRarity"
        limb:
          type: string
          maxLength: 40
        isEntry:
          type: boolean
          default: false
        posX:
          type: number
          nullable: true
        posY:
          type: number
          nullable: true

    SkillEdge:
      type: object
      required: [a, b]
      properties:
        a:
          type: string
          format: uuid
        b:
          type: string
          format: uuid

    SkillEdgesInput:
      type: object
      required: [edges]
      properties:
        edges:
          type: array
          items:
            $ref: "#/components/schemas/SkillEdge"

    SkillTreeDetail:
      type: object
      required: [tree, nodes, edges]
      properties:
        tree:
          $ref: "#/components/schemas/SkillTree"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/SkillNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/SkillEdge"

    CharacterTreeState:
      type: object
      required: [assigned]
      properties:
        assigned:
          type: boolean
        tree:
          $ref: "#/components/schemas/SkillTreeDetail"
        picksGranted:
          type: integer
        picksSpent:
          type: integer
          description: Picks consumed by taken nodes (keystones may cost more).
        picksRemaining:
          type: integer
        takenNodeIds:
          type: array
          items:
            type: string
            format: uuid

    SetPactRequest:
      type: object
      required: [treeId]
      properties:
        treeId:
          type: string
          format: uuid

    GrantPicksRequest:
      type: object
      required: [picks]
      properties:
        picks:
          type: integer
          minimum: 1
          maximum: 10

    SpendPickRequest:
      type: object
      required: [nodeId]
      properties:
        nodeId:
          type: string
          format: uuid

    RewardInput:
      type: object
      required: [type, label]
      properties:
        type:
          $ref: "#/components/schemas/RewardType"
        label:
          type: string
          minLength: 1
        value:
          type: string
          nullable: true

    CreateQuestRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        giver:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        difficulty:
          $ref: "#/components/schemas/QuestDifficulty"
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/RewardInput"

    UpdateQuestRequest:
      type: object
      required: [title, status, difficulty]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        giver:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        difficulty:
          $ref: "#/components/schemas/QuestDifficulty"
        status:
          $ref: "#/components/schemas/QuestStatus"
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/RewardInput"

security:
  - sessionCookie: []
