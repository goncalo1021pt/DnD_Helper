          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteEncounter
      summary: Discard an encounter and its combatants (DM only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /encounters/{encounterId}/combatants:
    parameters:
      - $ref: "#/components/parameters/EncounterId"
    post:
      operationId: addCombatant
      summary: Add a Den monster, a seated PC, or a custom line (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCombatantRequest"
      responses:
        "201":
          description: The new combatant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Combatant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /encounters/{encounterId}/roll-initiative:
    parameters:
      - $ref: "#/components/parameters/EncounterId"
    post:
      operationId: rollInitiative
      summary: Roll initiative (d20 + modifier) for every combatant at once (DM only)
      responses:
        "200":
          description: The encounter with rolled initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncounterDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /combatants/{combatantId}:
    parameters:
      - $ref: "#/components/parameters/CombatantId"
    patch:
      operationId: updateCombatant
      summary: Edit a combatant — HP, initiative, reveal, rename (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCombatantRequest"
      responses:
        "200":
          description: The updated combatant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Combatant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteCombatant
      summary: Remove a combatant (DM only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /combatants/{combatantId}/roll:
    parameters:
      - $ref: "#/components/parameters/CombatantId"
    post:
      operationId: rollCombatantInitiative
      summary: Roll this combatant's initiative (DM, or the owner of a PC combatant)
      responses:
        "200":
          description: The combatant with a fresh initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Combatant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  security:
    - sessionCookie: []

  parameters:
    CampaignId:
      name: campaignId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuestId:
      name: questId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CharacterId:
      name: characterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TreeId:
      name: treeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContentKind:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum: [class, species, background, subclass, feat, spell, item, monster]
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MapId:
      name: mapId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PinId:
      name: pinId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EncounterId:
      name: encounterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CombatantId:
      name: combatantId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Not allowed (not a member, or insufficient role)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded]

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Role:
      type: string
      enum: [dm, player]

    User:
      type: object
      required: [id, name, provider, emailVerified, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          nullable: true
        image:
          type: string
          nullable: true
        provider:
          type: string
          description: Where the account came from — discord, google, local, or dev.
        emailVerified:
          type: boolean
          description: Whether the account's email address is confirmed (OAuth accounts always are).
        createdAt:
          type: string
          format: date-time

    Campaign:
      type: object
      required: [id, name, ownerUserId, createdAt, inviteCode]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ownerUserId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        inviteCode:
          type: string
          description: Shareable code players use to join the campaign.
        nextSessionAt:
          type: string
          format: date-time
          nullable: true
          description: When the table gathers next; null when unscheduled.
        progression:
          type: string
          enum: [milestone, xp]
          description: How heroes advance at this table.

    CampaignMembership:
      type: object
      required: [campaign, role]
      properties:
        campaign:
          $ref: "#/components/schemas/Campaign"
        role:
          $ref: "#/components/schemas/Role"

    CurrentUser:
      type: object
      required: [user, campaigns]
      properties:
        user:
          $ref: "#/components/schemas/User"
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/CampaignMembership"

    CreateCampaignRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    JoinCampaignRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 1

    SetNextSessionRequest:
      type: object
      properties:
        nextSessionAt:
          type: string
          format: date-time
          nullable: true
          description: Omit or send null to clear the scheduled session.

    QuestStatus:
      type: string
      enum: [available, active, completed, failed]

    QuestDifficulty:
      type: string
      enum: [trivial, easy, medium, hard, deadly]

    RewardType:
      type: string
      enum: [gold, item, xp, reputation, other]

    QuestReward:
      type: object
      required: [id, type, label]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/RewardType"
        label:
          type: string
        value:
          type: string
          nullable: true

    QuestClaim:
      type: object
      required: [userId, userName, claimedAt]
      properties:
        userId:
          type: string
          format: uuid
        userName:
          type: string
        claimedAt:
          type: string
          format: date-time

    Quest:
      type: object
      required: [id, campaignId, title, description, difficulty, status, createdAt, rewards, claims, claimedByMe]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        giver:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        difficulty:
          $ref: "#/components/schemas/QuestDifficulty"
        status:
          $ref: "#/components/schemas/QuestStatus"
        createdAt:
          type: string
          format: date-time
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/QuestReward"
        claims:
          type: array
          items:
            $ref: "#/components/schemas/QuestClaim"
        claimedByMe:
          type: boolean

    Character:
      type: object
      required:
        [id, ownerUserId, ownerName, name, class, level, hpCurrent, hpMax, createdAt, mine]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
          nullable: true
          description: The campaign this hero is seated at; null while in My Heroes.
        campaignName:
          type: string
          nullable: true
          description: Name of the seated campaign, when known.
        ownerUserId:
          type: string
          format: uuid
        ownerName:
          type: string
          description: Display name of the member who plays this character.
        name:
          type: string
        class:
          type: string
          description: 'Freeform class/ancestry line, e.g. "Half-Elf Bard".'
        level:
          type: integer
        hpCurrent:
          type: integer
        hpMax:
          type: integer
        createdAt:
          type: string
          format: date-time
        mine:
          type: boolean
          description: True when the caller owns this character.
        xp:
          type: integer
          description: Experience points (XP-mode campaigns; advisory).
        pendingLevels:
          type: integer
          description: Milestone level-ups waiting to be taken.
        sheet:
          $ref: "#/components/schemas/CharacterSheet"

    CharacterSheet:
      type: object
      description: Present only on wizard-forged heroes.
      required: [abilities, skills]
      properties:
        abilities:
          $ref: "#/components/schemas/AbilityScores"
        skills:
          type: array
          items:
            type: string
        classId:
          type: string
          format: uuid
          nullable: true
        speciesId:
          type: string
          format: uuid
          nullable: true
        backgroundId:
          type: string
          format: uuid
          nullable: true
        subclassId:
          type: string
          format: uuid
          nullable: true
        feats:
          type: array
          items:
            type: string
        spellcastingAbility:
          type: string
          description: Present on casters (STR…CHA).
        spellSlots:
          type: array
          description: Present on casters — max and used per spell level.
          items:
            $ref: "#/components/schemas/SpellSlot"

    SpellSlot:
      type: object
      required: [level, max, used]
      properties:
        level: { type: integer, minimum: 1, maximum: 9 }
        max: { type: integer, minimum: 0 }
        used: { type: integer, minimum: 0 }

    AbilityScores:
      type: object
      required: [str, dex, con, int, wis, cha]
      properties:
        str: { type: integer, minimum: 3, maximum: 30 }
        dex: { type: integer, minimum: 3, maximum: 30 }
        con: { type: integer, minimum: 3, maximum: 30 }
        int: { type: integer, minimum: 3, maximum: 30 }
        wis: { type: integer, minimum: 3, maximum: 30 }
        cha: { type: integer, minimum: 3, maximum: 30 }

    ForgeRequest:
      type: object
      required: [name, classId, speciesId, backgroundId, abilities, skills]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        classId:
          type: string
          format: uuid
        speciesId:
          type: string
          format: uuid
        backgroundId:
          type: string
          format: uuid
        abilities:
          $ref: "#/components/schemas/AbilityScores"
          description: Final scores, background bonuses already applied.
        skills:
          type: array
          items:
            type: string
          description: Chosen class skills (background skills are implied).
        spells:
          type: array
          items:
            type: string
            format: uuid
          description: Level-1 spell picks (casters only; cantrips included).
        gear:
          type: string
          maxLength: 1
          description: >-
            Starting-equipment option label (A/B/C) from the class's
            startingEquipment data. The server stocks the inventory: listed
            items (linked to armory content where names match), gold as a
            Gold Pieces row, plus the background's equipment items.

    CharacterInput:
      type: object
      required: [name, level, hpCurrent, hpMax]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        class:
          type: string
          maxLength: 80
        level:
          type: integer
          minimum: 1
          maximum: 20
        hpCurrent:
          type: integer
          minimum: 0
        hpMax:
          type: integer
          minimum: 1

    SeatRequest:
      type: object
      properties:
        campaignId:
          type: string
          format: uuid
          nullable: true
          description: Omit or null to unseat the hero back to My Heroes.

    RulesContent:
      type: object
      required: [id, kind, source, name, summary, data, mine]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [class, species, background, subclass, feat, spell, item, monster]
        source:
          type: string
          enum: [srd, homebrew]
        name:
          type: string
        summary:
          type: string
        data:
          type: object
          description: Kind-specific payload (hit die, traits, features…).
          additionalProperties: true
        mine:
          type: boolean
          description: True when the caller authored this homebrew entry.
        creatorName:
          type: string
          nullable: true
          description: Author of a homebrew entry; null for SRD content.

    RulesContentInput:
      type: object
      required: [name, summary, data]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        summary:
          type: string
          maxLength: 300
        data:
          type: object
          additionalProperties: true

    LevelUpRequest:
      type: object
      required: [hpMode]
      properties:
        hpMode:
          type: string
          enum: [average, roll]
        hpRoll:
          type: integer
          minimum: 1
          maximum: 12
          description: The hit-die result when hpMode is roll.
        subclassId:
          type: string
          format: uuid
          description: Required when the new level is the class's subclass level.
        featId:
          type: string
          format: uuid
          description: Take a feat instead of ability increases at an ASI level.
        spells:
          type: array
          items:
            type: string
            format: uuid
          description: New spell picks gained with this level (casters only).
        asi:
          type: object
          description: Ability increases at an ASI level; total of 2 points, each +1 or +2.
          additionalProperties: false
          properties:
            str: { type: integer, minimum: 1, maximum: 2 }
            dex: { type: integer, minimum: 1, maximum: 2 }
            con: { type: integer, minimum: 1, maximum: 2 }
            int: { type: integer, minimum: 1, maximum: 2 }
            wis: { type: integer, minimum: 1, maximum: 2 }
            cha: { type: integer, minimum: 1, maximum: 2 }

    CodexEntry:
      type: object
      required: [content, status]
      properties:
        content:
          $ref: "#/components/schemas/RulesContent"
        status:
          type: string
          enum: [proposed, enabled, banned]
        proposerName:
          type: string
          nullable: true

    SeatConflict:
      type: object
      required: [error, missing]
      properties:
        error:
          type: string
        missing:
          type: array
          description: Content the hero uses that the codex has not admitted.
          items:
            type: object
            required: [id, kind, name, state]
            properties:
              id:
                type: string
                format: uuid
              kind:
                type: string
              name:
                type: string
              state:
                type: string
                enum: [absent, proposed, banned]
                description: absent = never offered; proposed = awaiting the DM; banned = the DM said no.

    SpellSlotsInput:
      type: object
      required: [used]
      properties:
        used:
          type: array
          maxItems: 9
          items:
            type: integer
            minimum: 0
          description: Slots spent per spell level (index 0 = level 1).

    InventoryItem:
      type: object
      required: [id, name, qty, equipped]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        qty:
          type: integer
        equipped:
          type: boolean
        slot:
          type: string
          enum: ["", armor, mainhand, offhand]
          description: Where an equipped item sits; empty when stowed.
        content:
          $ref: "#/components/schemas/RulesContent"
          nullable: true
          description: The rules entry behind this row; null for free-text gear.

    InventoryItemInput:
      type: object
      properties:
        contentId:
          type: string
          format: uuid
          description: An item from the library — or omit and use name for free-text gear.
        name:
          type: string
          maxLength: 80
        qty:
          type: integer
          minimum: 1
          maximum: 999
          default: 1

    InventoryItemPatch:
      type: object
      properties:
        qty:
          type: integer
          minimum: 1
          maximum: 999
        equipped:
          type: boolean
        slot:
          type: string
          enum: [armor, mainhand, offhand]
          description: >-
            Equip into a specific slot (implies equipped). Armor only fits
            the armor slot, shields only the off-hand; weapons fit either
            hand. Displaced occupants are unequipped in the same stroke.
            Use equipped:false to stow.

    CharacterDetail:
      type: object
      required: [character, spells, items]
      properties:
        character:
          $ref: "#/components/schemas/Character"
        spells:
          type: array
          items:
            $ref: "#/components/schemas/RulesContent"
        items:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"

    BestiaryNote:
      type: object
      required: [id, body, mine]
      properties:
        id:
          type: string
          format: uuid
        body:
          type: string
        authorName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        mine:
          type: boolean
          description: Whether the viewer penned this note.

    CampaignMap:
      type: object
      required: [id, campaignId, name, fogEnabled, width, height, createdAt]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        parentMapId:
          type: string
          format: uuid
          nullable: true
          description: The map this one details; null for an overworld.
        name:
          type: string
        fogEnabled:
          type: boolean
          description: When true, players see only what their reveal circles uncover.
        width:
          type: integer
          description: Pixel width of the stored image.
        height:
          type: integer
        createdAt:
          type: string
          format: date-time

    MapPin:
      type: object
      required: [id, mapId, label, note, x, y, dmOnly, createdAt]
      properties:
        id:
          type: string
          format: uuid
        mapId:
          type: string
          format: uuid
        label:
          type: string
        note:
          type: string
        x:
          type: number
          description: Fraction of the image width, 0..1.
        y:
          type: number
          description: Fraction of the image height, 0..1.
        dmOnly:
          type: boolean
        linkMapId:
          type: string
          format: uuid
          nullable: true
          description: When set, this pin is a region marker leading into that sub-map.
        createdAt:
          type: string
          format: date-time

    MapDetail:
      type: object
      required: [map, pins, revealed]
      properties:
        map:
          $ref: "#/components/schemas/CampaignMap"
        pins:
          type: array
          items:
            $ref: "#/components/schemas/MapPin"
        revealed:
          type: array
          description: >
            The caller's uncovered area — every circle for the DM, the union
            of the caller's pools for a player. Empty when fog is off.
          items:
            $ref: "#/components/schemas/RevealCircle"

    RevealCircle:
      type: object
      required: [x, y, r]
      properties:
        x:
          type: number
          description: Fraction of the image width, 0..1.
        y:
          type: number
          description: Fraction of the image height, 0..1.
        r:
          type: number
          description: Radius as a fraction of the image width.

    SubmitRevealsRequest:
      type: object
      required: [circles]
      properties:
        note:
          type: string
          description: Optional label for the ledger ("session 12 — the road east").
        circles:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/RevealCircle"

    RevealBatch:
      type: object
      required: [id, note, poolName, circles, createdAt]
      properties:
        id:
          type: string
          format: uuid
        note:
          type: string
        poolName:
          type: string
        circles:
          type: integer
          description: How many circles the batch stamped.
        createdAt:
          type: string
          format: date-time

    CreateMapRequest:
      type: object
      required: [name, imageBase64]
      properties:
        name:
          type: string
          minLength: 1
        imageBase64:
          type: string
          description: The image file, base64-encoded. JPEG or PNG, up to 10 MB decoded.
        parentMapId:
          type: string
          format: uuid
          nullable: true

    UpdateMapRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        parentMapId:
          type: string
          format: uuid
          nullable: true
        fogEnabled:
          type: boolean
          description: Omit to leave the fog as it is.

    MapPinInput:
      type: object
      required: [label, x, y]
      properties:
        label:
          type: string
          minLength: 1
        note:
          type: string
        x:
          type: number
          minimum: 0
          maximum: 1
        y:
          type: number
          minimum: 0
          maximum: 1
        dmOnly:
          type: boolean
        linkMapId:
          type: string
          format: uuid
          nullable: true

    Encounter:
      type: object
      required: [id, campaignId, name, status, round, turnIndex, combatantCount, createdAt]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          description: "draft | active | ended (plain string, validated server-side)."
        round:
          type: integer
        turnIndex:
          type: integer
          description: Index into the initiative order whose turn it is.
        combatantCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    Combatant:
      type: object
      required: [id, encounterId, kind, name, initMod, hpState, hidden, current, sortOrder]
      properties:
        current:
          type: boolean
          description: Whether it's this combatant's turn right now (false for all when a hidden enemy is acting).
        id:
          type: string
          format: uuid
        encounterId:
          type: string
          format: uuid
        kind:
          type: string
          description: "monster | pc | custom (plain string)."
        name:
          type: string
          description: The DM sees the true label; players see the reveal label ("Unknown" until named).
        playerLabel:
          type: string
          nullable: true
          description: DM-only — what players see for this combatant.
        contentId:
          type: string
          format: uuid
          nullable: true
          description: DM-only — the Den monster this was built from.
        characterId:
          type: string
          format: uuid
          nullable: true
          description: DM-only (or the viewer's own PC) — the seated character.
        initMod:
          type: integer
        initiative:
          type: integer
          nullable: true
          description: Order value; null until rolled or typed.
        hpCurrent:
          type: integer
          nullable: true
          description: DM, or the owner of a PC combatant. Omitted for players otherwise.
        hpMax:
          type: integer
          nullable: true
        ac:
          type: integer
          nullable: true
        hpState:
          type: string
          description: "healthy | bloodied | down — the only HP cue players get for others."
        hidden:
          type: boolean
          description: DM-only flag; hidden combatants are omitted from player payloads entirely.
        isMine:
          type: boolean
          description: For a player, whether this is their own PC (they may roll its initiative and see its HP).
        sortOrder:
          type: integer

    EncounterDetail:
      type: object
      required: [encounter, combatants]
      properties:
        encounter:
          $ref: "#/components/schemas/Encounter"
        combatants:
          type: array
          items:
            $ref: "#/components/schemas/Combatant"

    CreateEncounterRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    UpdateEncounterRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        status:
          type: string
          description: "draft | active | ended. Setting active triggers it (and ends any other running one)."
        round:
          type: integer
          minimum: 1
        turnIndex:
          type: integer
          minimum: 0

    AddCombatantRequest:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          description: "monster (needs contentId) | pc (needs characterId) | custom (typed)."
        contentId:
          type: string
          format: uuid
        characterId:
          type: string
          format: uuid
        label:
          type: string
          description: Name for a custom line, or an override for a monster/PC.
        playerLabel:
          type: string
        hpMax:
          type: integer
        ac:
          type: integer
        initMod:
          type: integer
        hidden:
          type: boolean

    UpdateCombatantRequest:
      type: object
      properties:
        label:
          type: string
        playerLabel:
          type: string
        initiative:
          type: integer
          nullable: true
        hpCurrent:
          type: integer
        hpMax:
          type: integer
        ac:
          type: integer
        hidden:
          type: boolean

    BestiaryEntry:
      type: object
      required: [id, title, identified, revealed, record, notes, canEdit, isDM]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          description: The party's own name for the creature.
        identified:
          type: boolean
          description: Whether the DM has linked this sighting to a known creature.
        monsterName:
          type: string
          nullable: true
          description: The creature's true name, present once identified.
        revealed:
          type: array
          items:
            type: string
            enum: [defenses, offense, traits, lore]
          description: Which record sections the DM has unveiled to the party.
        record:
          type: object
          additionalProperties:
            type: string
          description: >-
            Unveiled sections of the official stat block as rendered markdown,
            keyed by section. Members receive only revealed sections; the DM
            receives every section the creature has.
        notes:
          type: array
          items:
            $ref: "#/components/schemas/BestiaryNote"
        canEdit:
          type: boolean
          description: Whether the viewer may rename or delete this entry (creator or DM).
        isDM:
          type: boolean
          description: Whether the viewer may identify and unveil (DM only).

    BestiaryEntryInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120

    BestiaryEntryPatch:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        contentId:
          type: string
          format: uuid
          description: >-
            Link to a Den monster to identify the sighting (DM only). The
            all-zero UUID unlinks it, returning the entry to an unknown creature.
        revealed:
          type: array
          items:
            type: string
            enum: [defenses, offense, traits, lore]
          description: The full set of unveiled sections (idempotent; DM only).

    PackEntry:
      type: object
      required: [kind, name, data]
      properties:
        kind:
          type: string
          enum: [class, species, background, subclass, feat, spell, item, monster]
        name:
          type: string
          minLength: 1
          maxLength: 80
        summary:
          type: string
          maxLength: 300
        data:
          type: object
          additionalProperties: true

    HomebrewImpact:
      type: object
      required: [byKind]
      properties:
        byKind:
          type: array
          description: One row per kind you have homebrew in, with usage counts.
          items:
            type: object
            required: [kind, total, onMyCharacters, onOthersCharacters, inCampaigns]
            properties:
              kind:
                type: string
              total:
                type: integer
              onMyCharacters:
                type: integer
                description: Entries referenced by characters you own.
              onOthersCharacters:
                type: integer
                description: Entries referenced by other players' characters.
              inCampaigns:
                type: integer
                description: Entries admitted in a campaign codex.

    HomebrewBooks:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          description: One row per (book, kind) pair present in your homebrew.
          items:
            type: object
            required: [kind, total]
            properties:
              book:
                type: string
                nullable: true
                description: data.book of the entries; null for hand-scribed homebrew.
              kind:
                type: string
              total:
                type: integer

    ImportReport:
      type: object
      required: [created, updated, failed, results]
      properties:
        created:
          type: integer
        updated:
          type: integer
        failed:
          type: integer
        results:
          type: array
          items:
            type: object
            required: [kind, name, status]
            properties:
              kind:
                type: string
              name:
                type: string
              status:
                type: string
                enum: [created, updated, failed]
              error:
                type: string

    ChronicleEvent:
      type: object
      required: [id, kind, category, message, createdAt]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          description: quest_posted, hero_seated, level_up, codex_enabled, xp, milestone, note…
        category:
          type: string
          description: >
            The channel a line belongs to (plain string, not an enum, to avoid
            a codegen name clash): dm (the DM's story notes), rules (rulings +
            codex changes), player (player posts), log (system happenings).
            Derived from kind.
        message:
          type: string
        actorName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    NodeRarity:
      type: string
      enum: [minor, keystone]

    SkillTree:
      type: object
      required: [id, campaignId, name, description, keystonePickCost, createdAt]
      properties:
        id:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        keystonePickCost:
          type: integer
          description: How many picks a keystone eats (1 = gated only by the web).
        createdAt:
          type: string
          format: date-time

    SkillTreeInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
        keystonePickCost:
          type: integer
          minimum: 1
          maximum: 5
          default: 1

    SkillNode:
      type: object
      required: [id, treeId, name, description, rarity, limb, isEntry]
      properties:
        id:
          type: string
          format: uuid
        treeId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        tradeoff:
          type: string
          nullable: true
          description: The price baked into a keystone.
        rarity:
          $ref: "#/components/schemas/NodeRarity"
        limb:
          type: string
          description: Grouping label within the web, e.g. ENTROPY.
        isEntry:
          type: boolean
          description: Pickable with no prior picks in the tree.
        posX:
          type: number
          nullable: true
        posY:
          type: number
          nullable: true

    SkillNodeInput:
      type: object
      required: [name, rarity]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
        tradeoff:
          type: string
          nullable: true
        rarity:
          $ref: "#/components/schemas/NodeRarity"
        limb:
          type: string
          maxLength: 40
        isEntry:
          type: boolean
          default: false
        posX:
          type: number
          nullable: true
        posY:
          type: number
          nullable: true

    SkillEdge:
      type: object
      required: [a, b]
      properties:
        a:
          type: string
          format: uuid
        b:
          type: string
          format: uuid

    SkillEdgesInput:
      type: object
      required: [edges]
      properties:
        edges:
          type: array
          items:
            $ref: "#/components/schemas/SkillEdge"

    SkillTreeDetail:
      type: object
      required: [tree, nodes, edges]
      properties:
        tree:
          $ref: "#/components/schemas/SkillTree"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/SkillNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/SkillEdge"

    CharacterTreeState:
      type: object
      required: [assigned]
      properties:
        assigned:
          type: boolean
        tree:
          $ref: "#/components/schemas/SkillTreeDetail"
        picksGranted:
          type: integer
        picksSpent:
          type: integer
          description: Picks consumed by taken nodes (keystones may cost more).
        picksRemaining:
          type: integer
        takenNodeIds:
          type: array
          items:
            type: string
            format: uuid

    SetPactRequest:
      type: object
      required: [treeId]
      properties:
        treeId:
          type: string
          format: uuid

    GrantPicksRequest:
      type: object
      required: [picks]
      properties:
        picks:
          type: integer
          minimum: 1
          maximum: 10

    SpendPickRequest:
      type: object
      required: [nodeId]
      properties:
        nodeId:
          type: string
          format: uuid

    RewardInput:
      type: object
      required: [type, label]
      properties:
        type:
          $ref: "#/components/schemas/RewardType"
        label:
          type: string
          minLength: 1
        value:
          type: string
          nullable: true

    CreateQuestRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        giver:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        difficulty:
          $ref: "#/components/schemas/QuestDifficulty"
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/RewardInput"

    UpdateQuestRequest:
      type: object
      required: [title, status, difficulty]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        giver:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        difficulty:
          $ref: "#/components/schemas/QuestDifficulty"
        status:
          $ref: "#/components/schemas/QuestStatus"
        rewards:
          type: array
          items:
            $ref: "#/components/schemas/RewardInput"

security:
  - sessionCookie: []
