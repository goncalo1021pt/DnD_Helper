openapi: 3.0.3
info:
  title: Quest Board API
  version: 0.1.0
  description: |
    Self-hosted D&D campaign helper. This spec is the single source of truth for
    the API contract: the Go server interface and the TypeScript client are both
    generated from it (`make generate`).
servers:
  - url: /api

paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness / readiness probe
      security: []
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: Service degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /me:
    get:
      operationId: getCurrentUser
      summary: The currently authenticated user and their campaign memberships
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /campaigns:
    get:
      operationId: listCampaigns
      summary: Campaigns the current user belongs to
      responses:
        "200":
          description: List of campaigns with the caller's role in each
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignMembership"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCampaign
      summary: Create a campaign (caller becomes its DM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        "201":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /campaigns/join:
    post:
      operationId: joinCampaign
      summary: Join a campaign as a player using its invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinCampaignRequest"
      responses:
        "200":
          description: The joined campaign with the caller's role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignMembership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/regenerate-invite:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    post:
      operationId: regenerateInvite
      summary: Generate a fresh invite code (DM only)
      responses:
        "200":
          description: Campaign with the new invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/next-session:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    put:
      operationId: setNextSession
      summary: Set or clear when the table gathers next (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetNextSessionRequest"
      responses:
        "200":
          description: Campaign with the updated next session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/quests:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: listQuests
      summary: List quests on a campaign's board (members only)
      responses:
        "200":
          description: Quests with rewards and claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createQuest
      summary: Post a new quest (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestRequest"
      responses:
        "201":
          description: Created quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /quests/{questId}:
    parameters:
      - $ref: "#/components/parameters/QuestId"
    patch:
      operationId: updateQuest
      summary: Update a quest, including its status and rewards (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestRequest"
      responses:
        "200":
          description: Updated quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteQuest
      summary: Remove a quest (DM only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /me/characters:
    get:
      operationId: listMyCharacters
      summary: The caller's heroes across all campaigns, including unseated ones
      responses:
        "200":
          description: Heroes with where they are seated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMyCharacter
      summary: Forge a hero in My Heroes (not seated at any campaign)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "201":
          description: Created hero
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /me/characters/forge:
    post:
      operationId: forgeCharacter
      summary: Create a hero through the builder — full sheet, derived HP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgeRequest"
      responses:
        "201":
          description: The forged hero, resting in My Heroes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /characters/{characterId}/seat:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    put:
      operationId: seatCharacter
      summary: Seat a hero at a campaign, or null to return them to My Heroes (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeatRequest"
      responses:
        "200":
          description: Hero after moving
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The hero uses content the campaign's codex has not admitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeatConflict"

  /characters/{characterId}/slots:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    put:
      operationId: setSpellSlots
      summary: Set spell slots spent (owner or DM; casters only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpellSlotsInput"
      responses:
        "200":
          description: Hero with updated slots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /characters/{characterId}/items:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      operationId: addInventoryItem
      summary: Add an item to a hero's inventory (owner or DM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemInput"
      responses:
        "201":
          description: The new inventory row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /characters/{characterId}/items/{itemId}:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
      - name: itemId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: updateInventoryItem
      summary: Change quantity or equip state (owner or DM)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemPatch"
      responses:
        "200":
          description: The updated row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteInventoryItem
      summary: Remove an inventory row (owner or DM)
      responses:
        "204":
          description: Removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /rules/import:
    post:
      operationId: importContentPack
      summary: Batch-import a content pack as your private homebrew (upserts by name)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entries]
              properties:
                entries:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    $ref: "#/components/schemas/PackEntry"
      responses:
        "200":
          description: Per-entry results (failures do not abort the batch)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rules/export:
    get:
      operationId: exportContentPack
      summary: Your homebrew as a content pack (keep it out of public repos)
      responses:
        "200":
          description: The pack
          content:
            application/json:
              schema:
                type: object
                required: [entries]
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/PackEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rules/homebrew/impact:
    get:
      operationId: getHomebrewImpact
      summary: What a homebrew reset would touch — counts and in-use references
      responses:
        "200":
          description: Per-kind counts of your homebrew and what references it
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomebrewImpact"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rules/homebrew:
    delete:
      operationId: resetHomebrew
      summary: Delete your homebrew — all of it, or one kind (author's own only)
      parameters:
        - name: kind
          in: query
          required: false
          description: >-
            Limit the wipe to a single content kind (class, species, background,
            subclass, feat, spell, item, monster); omit to wipe every kind.
          schema:
            type: string
      responses:
        "200":
          description: How many entries were removed
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rules/{kind}:
    parameters:
      - $ref: "#/components/parameters/ContentKind"
    get:
      operationId: listRules
      summary: Rules content of one kind (SRD + this instance's homebrew)
      responses:
        "200":
          description: Content entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RulesContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRulesContent
      summary: Add a homebrew entry of this kind (any signed-in user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulesContentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /rules/content/{contentId}:
    parameters:
      - name: contentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: updateRulesContent
      summary: Edit a homebrew entry (author only; SRD is immutable)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulesContentInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulesContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRulesContent
      summary: Remove a homebrew entry (author only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /characters/{characterId}/levelup:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    post:
      operationId: levelUpCharacter
      summary: Advance a forged hero one level (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LevelUpRequest"
      responses:
        "200":
          description: The hero, one level mightier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaignId}/events:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: listEvents
      summary: The campaign chronicle, newest first (members)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChronicleEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: addChronicleNote
      summary: Write a story entry into the chronicle (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        "201":
          description: The entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChronicleEvent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaignId}/xp:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    post:
      operationId: grantXP
      summary: Grant (or dock) XP to seated heroes (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: integer
                  minimum: -100000
                  maximum: 100000
                characterIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Omit to grant to every seated hero.
                reason:
                  type: string
                  maxLength: 200
      responses:
        "200":
          description: The heroes after the grant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaignId}/milestone:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    post:
      operationId: declareMilestone
      summary: A milestone — every seated hero gains one pending level-up (DM only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  maxLength: 200
      responses:
        "204":
          description: Declared
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaignId}/progression:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    put:
      operationId: setProgression
      summary: Switch the campaign between milestone and XP progression (DM only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [milestone, xp]
      responses:
        "200":
          description: The campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaignId}/codex:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: getCodex
      summary: The campaign's codex — every explicit ruling plus proposals (members)
      responses:
        "200":
          description: Codex entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CodexEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: proposeCodexContent
      summary: Offer your homebrew to the table (members; DM decides)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contentIds]
              properties:
                contentIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
      responses:
        "204":
          description: Proposed
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaignId}/codex/bulk:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    post:
      operationId: setCodexStatusBulk
      summary: One verdict over many entries (DM only — pack admissions)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contentIds, status]
              properties:
                contentIds:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  items:
                    type: string
                    format: uuid
                status:
                  type: string
                  enum: [enabled, banned]
      responses:
        "204":
          description: Ruled
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaignId}/codex/{contentId}:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
      - name: contentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: setCodexStatus
      summary: The DM's verdict on an entry (enable homebrew, ban/unban SRD)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [enabled, banned]
      responses:
        "204":
          description: Ruled
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: clearCodexStatus
      summary: Remove a ruling — back to defaults (DM only)
      responses:
        "204":
          description: Cleared
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaignId}/characters:
    parameters:
      - $ref: "#/components/parameters/CampaignId"
    get:
      operationId: listCharacters
      summary: The campaign's party roster (members only)
      responses:
        "200":
          description: Characters in the campaign
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createCharacter
      summary: Add a character owned by the caller (any campaign member)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "201":
          description: Created character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /characters/{characterId}:
    parameters:
      - $ref: "#/components/parameters/CharacterId"
    get:
      operationId: getCharacter
      summary: A hero's full sheet — owner, or members of the seated campaign
      responses:
        "200":
          description: The hero in full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCharacter
