version: "2"
sql:
  - engine: "postgresql"
    # sqlc reads the golang-migrate migrations as the schema source and applies
    # only the *.up.sql files.
    schema: "internal/db/migrations"
    queries: "queries"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
